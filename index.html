<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChebuYoga</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #ff9800; --music: #4caf50; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; background: var(--card); padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; }
        h1 { font-size: 24px; color: var(--accent); margin: 0 0 10px 0; }
        .timer { font-size: 64px; font-weight: bold; margin: 15px 0; font-variant-numeric: tabular-nums; }
        .status { font-size: 16px; color: #aaa; }
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(25, 18, 12, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .content { text-align: center; max-width: 500px; padding: 20px; }
        
        /* Стили для Чебурашки с ДВУМЯ ушами */
        .cheburashka { width: 160px; height: 100px; fill: var(--accent); animation: float 4s infinite ease-in-out; margin-bottom: 15px; }
        
        .speech { font-style: italic; color: #ffcc80; font-size: 18px; margin-bottom: 20px; }
        .exercises { text-align: left; font-size: 18px; line-height: 1.6; margin-bottom: 25px; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-bottom: 15px; }
        .btn { background: transparent; color: #ffcc80; border: 2px solid var(--accent); padding: 12px 25px; font-size: 16px; border-radius: 25px; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background: var(--accent); color: #121212; transform: scale(1.05); }
        .btn-m { border-color: var(--music); color: #a5d6a7; }
        .btn-m:hover { background: var(--music); color: #121212; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Время работать ✨</h1>
        <div class="status">До разминки осталось:</div>
        <div class="timer" id="w-timer">01:00</div>
    </div>

    <div class="overlay" id="overlay">
        <div class="content">
            
            <!-- Исправленный Чебурашка: круглая голова, тело и два больших круглых уха по бокам -->
            <svg class="cheburashka" viewBox="0 0 40 24">
                <!-- Левое ухо -->
                <circle cx="8" cy="10" r="6" />
                <!-- Правое ухо -->
                <circle cx="32" cy="10" r="6" />
                <!-- Голова -->
                <circle cx="20" cy="10" r="5.5" />
                <!-- Тело/Плечи -->
                <path d="M12,22 C12,17 28,17 28,22 Z" />
            </svg>
            
            <h2>Время разминки! 🧘‍♂️</h2>
            <div class="speech">«Ген, заbasic-уйся... Вдохни поглубже и расправь плечи!»</div>
            <div class="timer" id="r-timer" style="color: var(--accent);">02:00</div>
            
            <ul class="exercises">
                <li>👀 <strong>Глаза:</strong> Закрой глаза на 10 секунд, посмотри в окно вдаль.</li>
                <li>🧘‍♂️ <strong>Спина:</strong> Встань ровно, потянись руками вверх.</li>
                <li>💧 <strong>Вода:</strong> Сделай пару глотков чистой воды.</li>
            </ul>

            <div class="btn-group">
                <button class="btn btn-m" id="m-btn">🎵 Включить музыку релакс</button>
                <button class="btn" id="s-btn">Вернуться в суету</button>
            </div>
        </div>
    </div>

    <!-- Аудио-плеер, который берёт музыку из настроек ниже -->
    <audio id="bg-music" preload="auto" loop></audio>

    <script>
        // =========================================================================
        // НАСТРОЙКИ: ТУТ МОЖНО ВСЁ МЕНЯТЬ САМОМУ
        // =========================================================================
        const W_TIME = 3600;   // Время работы в секундах (3600 секунд = 1 час)
        const R_TIME = 120;  // Время отдыха в секундах (120 секунд = 2 минуты)

        // Ссылка на спокойную фоновую музыку. Можешь заменить адрес в кавычках на свой!
        const MUSIC_URL = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3";
        // =========================================================================

        let work = W_TIME, rest = R_TIME, timer = null;

        const wEl = document.getElementById('w-timer');
        const rEl = document.getElementById('r-timer');
        const ovEl = document.getElementById('overlay');
        const musicAudio = document.getElementById('bg-music');
        
        // Назначаем ссылку плееру из настроек сверху
        musicAudio.src = MUSIC_URL;

        function format(s) {
            return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
        }

        function startWork() {
            work = W_TIME;
            wEl.innerText = format(work);
            ovEl.classList.remove('active');
            
            musicAudio.pause();
            musicAudio.currentTime = 0;
            
            clearInterval(timer);
            timer = setInterval(() => {
                work--;
                wEl.innerText = format(work);
                if (work <= 0) { clearInterval(timer); startRest(); }
            }, 1000);
        }

        function startRest() {
            rest = R_TIME;
            rEl.innerText = format(rest);
            ovEl.classList.add('active');
            
            clearInterval(timer);
            timer = setInterval(() => {
                rest--;
                rEl.innerText = format(rest);
                if (rest <= 0) { clearInterval(timer); startWork(); }
            }, 1000);
        }

        document.getElementById('m-btn').addEventListener('click', () => {
            musicAudio.play().catch(e => console.log("Браузер заблокировал звук"));
        });

        document.getElementById('s-btn').addEventListener('click', startWork);

        startWork();
    </script>
</body>
</html>
