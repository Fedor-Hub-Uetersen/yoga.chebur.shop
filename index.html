<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChebuYoga — Tech.chebur.shop</title>
    <style>
        :root { 
            --bg: #0a0a0c; --card: #121216; --text: #ffffff; 
            --accent: #ff5500; --music: #00ff66; 
            --neon-glow: 0 0 15px var(--accent), 0 0 30px var(--accent);
            --neon-music: 0 0 15px var(--music);
            --neon-footer: 0 0 6px var(--accent);
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { position: relative; text-align: center; background: var(--card); padding: 40px; border-radius: 20px; border: 2px solid var(--accent); box-shadow: 0 0 25px rgba(255, 85, 0, 0.2); width: 380px; }
        .lang-switcher { position: absolute; top: 15px; left: 20px; display: flex; gap: 8px; z-index: 100; }
        .lang-btn { background: #1a1a24; border: 1px solid #444; color: #8a8a93; padding: 3px 8px; font-size: 11px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .lang-btn.active { border-color: var(--music); color: #fff; box-shadow: 0 0 5px var(--music); }
        .streak-counter { position: absolute; top: 15px; right: 20px; font-size: 11px; font-weight: bold; color: var(--music); text-shadow: 0 0 5px var(--music); text-transform: uppercase; }
        .logo-area { margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .wolf-logo-placeholder { font-size: 18px; font-weight: bold; letter-spacing: 2px; color: #fff; text-shadow: var(--neon-glow); border: 1px dashed rgba(255, 85, 0, 0.4); padding: 10px 20px; border-radius: 10px; text-transform: uppercase; }
        h1 { font-size: 24px; color: #fff; text-shadow: var(--neon-glow); margin: 15px 0 5px 0; text-transform: uppercase; }
        .timer { font-size: 68px; font-weight: bold; margin: 10px 0; font-variant-numeric: tabular-nums; text-shadow: 0 0 10px #fff; }
        .sound-selector { margin: 15px 0 5px 0; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .sound-selector select { background: #1a1a24; color: #fff; border: 1px solid var(--accent); padding: 6px 12px; border-radius: 10px; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(6, 6, 8, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .content { text-align: center; max-width: 600px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .my-video { width: 340px; height: 190px; border-radius: 15px; border: 2px solid var(--accent); box-shadow: var(--neon-glow); margin-bottom: 20px; background: #000; }
        .speech { font-style: italic; color: #ffaa66; font-size: 18px; margin-bottom: 15px; }
        .exercises { text-align: left; font-size: 18px; line-height: 1.6; margin-bottom: 20px; width: 100%; color: #e1e1e6; }
        .btn-group { display: flex; gap: 15px; justify-content: center; }
        .btn { background: transparent; color: #fff; border: 2px solid var(--accent); padding: 12px 25px; font-size: 15px; border-radius: 25px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: all 0.2s; }
        .btn:hover { background: var(--accent); box-shadow: var(--neon-glow); color: #000; }
        .btn-m { border-color: var(--music); }
        .btn-m:hover { background: var(--music); box-shadow: var(--neon-music); color: #000; }
        .footer-credits { margin-top: 25px; font-size: 11px; color: #bbb; text-transform: uppercase; }
        .footer-credits a, .neon-phone { color: var(--accent); text-shadow: var(--neon-footer); font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="lang-switcher">
            <button class="lang-btn" id="lang-ru-main" onclick="applyLanguage('ru')">RU</button>
            <button class="lang-btn" id="lang-de-main" onclick="applyLanguage('de')">DE</button>
        </div>
        <div class="streak-counter" id="streak-display">Bio-Score: 0</div>
        <div class="logo-area">
            <div class="wolf-logo-placeholder">TECH.CHEBUR.SHOP</div>
        </div>
        <h1 id="main-title">Время работать ✨</h1>
        <div class="timer" id="w-timer">01:00</div>
        <div class="sound-selector">
            <label id="sound-label">🔔 Сигнал:</label>
            <select id="alarm-sound-select">
                <option value="digital.mp3" id="opt-dig">Цифровой</option>
                <option value="gong.mp3" id="opt-gong">Гонг</option>
                <option value="bowl.mp3" id="opt-bowl">Чаша</option>
            </select>
        </div>
        <div class="footer-credits">© Tm.<a href="https://tech.chebur.shop">tech.chebur.shop</a> | <span class="neon-phone">+49017661566356</span></div>
    </div>

    <div class="overlay" id="overlay">
        <div class="lang-switcher" style="top: 20px; left: 20px;">
            <button class="lang-btn" id="lang-ru-over" onclick="applyLanguage('ru')">RU</button>
            <button class="lang-btn" id="lang-de-over" onclick="applyLanguage('de')">DE</button>
        </div>
        <div class="content">
            <video class="my-video" id="yoga-video" controls loop muted><source src="video.mp4" type="video/mp4"></video>
            <h2 id="rest-title">Время разминки! 🧘‍♂️</h2>
            <div class="speech" id="rest-speech"></div>
            <div class="timer" id="r-timer" style="color:var(--music)">02:00</div>
            <ul class="exercises" id="exercises-list"></ul>
            <div class="btn-group">
                <button class="btn btn-m" id="m-btn">🎵 Music</button>
                <button class="btn" id="s-btn">Back</button>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop></audio>
    <audio id="alarm-sound"></audio>

    <script>
        const i18n = {
            ru: { mainTitle: "Время работать ✨", soundLabel: "🔔 Сигнал:", optDig: "Цифровой", optGong: "Гонг", optBowl: "Чаша", restTitle: "Время разминки! 🧘‍♂️", restSpeech: "«Ген, заbasic-уйся... Вдохни поглубже, расправь плечи!»", btnMusicOn: "🎵 Музыка", btnMusicOff: "⏸ Пауза", btnReturn: "Вернуться", exercises: ["👀 <strong>Глаза:</strong> Взгляд вдаль.", "🧘‍♂️ <strong>Спина:</strong> Потянись вверх.", "💧 <strong>Вода:</strong> Сделай глоток."] },
            de: { mainTitle: "Zeit zu arbeiten ✨", soundLabel: "🔔 Pausensignal:", optDig: "Digital", optGong: "Gong", optBowl: "Schale", restTitle: "Zeit für die Pause! 🧘‍♂️", restSpeech: "«Gena, entbasic-e dich... Atme tief ein!»", btnMusicOn: "🎵 Musik", btnMusicOff: "⏸ Pause", btnReturn: "Zurück", exercises: ["👀 <strong>Augen:</strong> Blick in die Ferne.", "🧘‍♂️ <strong>Rücken:</strong> Streck dich.", "💧 <strong>Wasser:</strong> Ein Schluck trinken."] }
        };

        let currentLang = localStorage.getItem('chebu_lang') || 'ru';
        const musicAudio = document.getElementById('bg-music');
        musicAudio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3";

        function applyLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('chebu_lang', lang);
            document.getElementById('main-title').innerText = i18n[lang].mainTitle;
            document.getElementById('sound-label').innerText = i18n[lang].soundLabel;
            document.getElementById('opt-dig').innerText = i18n[lang].optDig;
            document.getElementById('opt-gong').innerText = i18n[lang].optGong;
            document.getElementById('opt-bowl').innerText = i18n[lang].optBowl;
            document.getElementById('rest-title').innerText = i18n[lang].restTitle;
            document.getElementById('rest-speech').innerText = i18n[lang].restSpeech;
            document.getElementById('s-btn').innerText = i18n[lang].btnReturn;
            document.getElementById('m-btn').innerText = musicAudio.paused ? i18n[lang].btnMusicOn : i18n[lang].btnMusicOff;
            
            const list = document.getElementById('exercises-list');
            list.innerHTML = i18n[lang].exercises.map(ex => `<li>${ex}</li>`).join('');
            
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('lang-' + lang + '-main').classList.add('active');
            document.getElementById('lang-' + lang + '-over').classList.add('active');
        }

        // ... остальная логика таймера (оставь свою) ...
        applyLanguage(currentLang);
    </script>
</body>
</html>
